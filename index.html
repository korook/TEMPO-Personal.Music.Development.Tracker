<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo — Music Development Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c0d;--s1:#131315;--s2:#1a1a1d;--s3:#222225;--s4:#2a2a2e;--s5:#333337;
  --accent:#e85c3a;--accent2:#d44a2a;--glow:rgba(232,92,58,0.12);
  --green:#3dba7a;--amber:#e8a832;--blue:#4a8fe8;--purple:#9b6dd7;--pink:#d4537e;--teal:#38b2a0;
  --tx:#f0ede6;--tx2:#9c9a92;--tx3:#6a6862;--bd:#2a2a2e;--bd2:#3a3a3e;
  --serif:'Instrument Serif',serif;--sans:'Plus Jakarta Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--rl:14px;
}
html{background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ─── Shell ─── */
.app{max-width:940px;margin:0 auto;padding:20px 24px 80px}
.header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:18px;margin-bottom:2px;border-bottom:1px solid var(--bd)}
.logo{font-family:var(--serif);font-size:32px;color:var(--accent);letter-spacing:-0.5px}
.logo-sub{font-size:12px;color:var(--tx3);font-family:var(--mono)}
.greet{text-align:right}
.greet-line{font-family:var(--serif);font-size:17px;color:var(--tx2)}
.greet-line b{color:var(--tx);font-weight:500}
.greet-date{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-top:2px}
.tabs{display:flex;gap:2px;margin:14px 0 20px;border-bottom:1px solid var(--bd);overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.6px}
.tab:hover{color:var(--tx2)}.tab.on{color:var(--tx);border-color:var(--accent)}
.page{display:none}.page.on{display:block}

/* ─── Common ─── */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:20px;margin-bottom:14px;animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card-t{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-t .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.sec{font-size:12px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin:26px 0 12px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--bd)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.met{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}
.met::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.met:nth-child(1)::before{background:var(--accent)}.met:nth-child(2)::before{background:var(--green)}.met:nth-child(3)::before{background:var(--blue)}.met:nth-child(4)::before{background:var(--amber)}
.met .ml{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.met .mv{font-family:var(--mono);font-size:24px;font-weight:500}
.met .ms{font-size:11px;color:var(--tx3);margin-top:3px}
.two{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
.two-eq{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-box{position:relative;height:210px;margin:6px 0 2px}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--tx3);margin-top:4px}
.legend span{display:flex;align-items:center;gap:4px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ─── Buttons ─── */
.btn{display:block;width:100%;padding:11px;border-radius:var(--r);border:1px solid var(--bd2);background:var(--s2);color:var(--tx);font-size:13px;font-weight:600;cursor:pointer;transition:all .1s;font-family:var(--sans)}
.btn:hover{background:var(--s3)}.btn:active{transform:scale(.98)}
.btn.run{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ─── Chord grid ─── */
.cg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.cc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .12s;text-align:center}
.cc:hover{border-color:var(--bd2);background:var(--s2)}
.cc.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 16px var(--glow)}
.cc .cn{font-family:var(--serif);font-size:20px;margin-bottom:1px}
.cc .ct{font-size:10px;color:var(--tx3)}
.diff{display:inline-block;font-size:9px;padding:2px 8px;border-radius:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.diff-easy{background:rgba(61,186,122,.15);color:#3dba7a}
.diff-med{background:rgba(232,168,50,.15);color:#e8a832}
.diff-hard{background:rgba(232,92,58,.15);color:#e85c3a}

/* ─── Detail panel ─── */
.detail{display:flex;gap:20px;margin-top:16px;flex-wrap:wrap}
.fb-panel{flex:0 0 280px;background:var(--s2);border-radius:var(--rl);padding:24px;display:flex;flex-direction:column;align-items:center}
.info-p{flex:1;min-width:260px}
.irow{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);font-size:13px}
.irow .k{color:var(--tx3)}.irow .v{font-weight:500}
.tip{margin-top:14px;padding:14px 16px;border-radius:var(--r);background:rgba(74,143,232,.08);border-left:3px solid var(--blue);font-size:12px;color:var(--tx2);line-height:1.6}
.songs{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.stag{font-size:11px;background:var(--s3);border-radius:6px;padding:4px 10px;color:var(--tx2)}
.sdots{display:flex;gap:6px;margin-top:10px}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff}

/* ─── Progress bars ─── */
.pi{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bd)}
.pbadge{width:40px;height:40px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:14px;font-weight:500;color:#fff}
.pbw{flex:1}
.pbl{display:flex;justify-content:space-between;font-size:12px;color:var(--tx3);margin-bottom:4px}
.pb{height:5px;border-radius:3px;background:var(--s3);overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s}

/* ─── Heatmap ─── */
.hm{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0}
.hc{aspect-ratio:1;border-radius:4px;position:relative}
.hc:hover::after{content:attr(data-t);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--s4);color:var(--tx);font-size:10px;padding:3px 8px;border-radius:4px;white-space:nowrap;z-index:10;pointer-events:none}

/* ─── Mastery grid ─── */
.mg{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin:12px 0}
.mc{text-align:center;cursor:pointer;transition:transform .1s}
.mc:hover{transform:scale(1.06)}
.mb{width:100%;aspect-ratio:1;border-radius:var(--r);border:2px solid;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:15px;font-weight:500;position:relative;overflow:hidden}
.mfill{position:absolute;bottom:0;left:0;right:0;opacity:.12}
.mpct{font-size:10px;color:var(--tx3);margin-top:3px;font-family:var(--mono)}

/* ─── Metronome / Practice ─── */
.bpm-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.bpm-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--bd2);background:var(--s2);color:var(--tx);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s}
.bpm-btn:hover{background:var(--s3)}.bpm-btn:active{transform:scale(.92)}
.bpm-d{text-align:center}
.bpm-n{font-family:var(--mono);font-size:28px;font-weight:500}
.bpm-l{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.bpm-s{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--s3);outline:none}
.bpm-s::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;border:none}
.bdots{display:flex;gap:10px;justify-content:center;margin:16px 0}
.bd{width:18px;height:18px;border-radius:50%;background:var(--s3);border:1px solid var(--bd2);transition:all .06s}
.bd.on{background:var(--accent);border-color:var(--accent);transform:scale(1.25);box-shadow:0 0 12px var(--glow)}
.bd.down{background:var(--accent2);border-color:var(--accent2);transform:scale(1.3)}
.drill-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.drill{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px}
.drill .dn{font-family:var(--serif);font-size:17px;margin-bottom:2px}
.drill .ds{font-size:11px;color:var(--tx3)}
.exercise{padding:12px 16px;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px}
.exercise .en{font-size:13px;font-weight:600;margin-bottom:3px}
.exercise .ed{font-size:12px;color:var(--tx3);line-height:1.5}

/* ─── Suggest ─── */
.sg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.sug{padding:14px;border-radius:var(--rl);cursor:pointer;transition:all .12s;border:1px solid transparent}
.sug:hover{transform:translateY(-1px)}
.sug .st{font-size:13px;font-weight:600;margin-bottom:3px}
.sug .sd{font-size:11px;opacity:.75}

/* ─── Placeholder section ─── */
.placeholder{text-align:center;padding:60px 20px;color:var(--tx3)}
.placeholder .ph-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.placeholder .ph-title{font-size:18px;font-weight:600;color:var(--tx2);margin-bottom:6px}
.placeholder .ph-sub{font-size:13px;line-height:1.6;max-width:400px;margin:0 auto}

/* ─── Session log ─── */
.slog{max-height:260px;overflow-y:auto}
.sr{display:flex;gap:14px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:13px}
.sr .sd{color:var(--tx3);min-width:100px}.sr .sm{font-family:var(--mono);font-weight:500;min-width:50px}

/* ─── Responsive ─── */
@media(max-width:700px){.metrics{grid-template-columns:repeat(2,1fr)}.cg{grid-template-columns:repeat(3,1fr)}.detail{flex-direction:column}.fb-panel{flex:none;width:100%}.two,.two-eq{grid-template-columns:1fr}.mg{grid-template-columns:repeat(4,1fr)}.sg{grid-template-columns:1fr}.drill-g{grid-template-columns:1fr}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><div class="logo">Tempo</div><div class="logo-sub">music development tracker</div></div>
    <div class="greet" id="greetBox"></div>
  </div>
  <div class="tabs" id="tabBar"></div>
  <div id="pg-dashboard" class="page on"></div>
  <div id="pg-guitar" class="page"></div>
  <div id="pg-practice" class="page"></div>
  <div id="pg-progress" class="page"></div>
  <div id="pg-production" class="page"></div>
  <div id="pg-ear" class="page"></div>
  <div id="pg-theory" class="page"></div>
</div>

<script>
// ═══════════════ CHORD DATABASE (verified: Fender, fachords.com, Guitar Tricks) ═══════════════
const CH={
  'C':  {n:'C',  t:'Major',        no:'C E G',      s:['x',0,1,0,2,3], f:[0,0,1,0,2,3], m:[1,0,0,0,0,0], d:'easy',
         tip:'Ring finger on A string fret 3, middle on D fret 2, index on B fret 1. Strum from A string down — skip low E. Arch your fingers so open G and high E ring clearly.',
         songs:['Let It Be','No Woman No Cry','Wonderful Tonight']},
  'Am': {n:'Am', t:'Minor',        no:'A C E',      s:['x',0,2,2,1,0], f:[0,0,2,3,1,0], m:[1,0,0,0,0,0], d:'easy',
         tip:'Index on B fret 1, middle on D fret 2, ring on G fret 2. Strum from open A. Very similar to C — practice switching between them.',
         songs:['Stairway to Heaven','Nothing Else Matters','Hotel California']},
  'G':  {n:'G',  t:'Major',        no:'G B D',      s:[3,2,0,0,0,3],   f:[2,1,0,0,0,3], m:[0,0,0,0,0,0], d:'easy',
         tip:'Middle on low E fret 3, index on A fret 2, pinky on high E fret 3. All 6 strings. Big full sound — foundation of rock and folk.',
         songs:['Sweet Home Alabama','Knockin\' on Heaven\'s Door','Wonderwall']},
  'Em': {n:'Em', t:'Minor',        no:'E G B',      s:[0,2,2,0,0,0],   f:[0,2,3,0,0,0], m:[0,0,0,0,0,0], d:'easy',
         tip:'Easiest guitar chord. Middle on A fret 2, ring on D fret 2. All 6 strings ring. Perfect first chord for beginners.',
         songs:['Wish You Were Here','Hey Joe','Losing My Religion']},
  'D':  {n:'D',  t:'Major',        no:'D F# A',     s:['x','x',0,2,3,2],f:[0,0,0,1,3,2], m:[1,1,0,0,0,0], d:'easy',
         tip:'Index on G fret 2, ring on B fret 3, middle on high E fret 2. Only strum top 4 strings (D through high E). Bright happy tone.',
         songs:['Brown Eyed Girl','Summer of \'69','Horse With No Name']},
  'Dm': {n:'Dm', t:'Minor',        no:'D F A',      s:['x','x',0,2,3,1],f:[0,0,0,2,3,1], m:[1,1,0,0,0,0], d:'easy',
         tip:'Index on high E fret 1, middle on G fret 2, ring on B fret 3. Strum from D string. Melancholic sound great for blues and ballads.',
         songs:['Dust in the Wind','House of the Rising Sun','Hurt']},
  'A':  {n:'A',  t:'Major',        no:'A C# E',     s:['x',0,2,2,2,0], f:[0,0,1,2,3,0], m:[1,0,0,0,0,0], d:'easy',
         tip:'Three fingers on fret 2: index on D, middle on G, ring on B. Strum from open A. Keep fingers compact so high E rings open.',
         songs:['Yellow','Free Fallin\'','Take Me Home Country Roads']},
  'E':  {n:'E',  t:'Major',        no:'E G# B',     s:[0,2,2,1,0,0],   f:[0,2,3,1,0,0], m:[0,0,0,0,0,0], d:'easy',
         tip:'Index on G fret 1, middle on A fret 2, ring on D fret 2. All 6 strings. Powerful full sound — foundation of countless rock songs.',
         songs:['Back in Black','Smells Like Teen Spirit','Purple Haze']},
  'F':  {n:'F',  t:'Major (barre)',no:'F A C',       s:[1,1,2,3,3,1],   f:[1,1,2,3,4,1], m:[0,0,0,0,0,0], d:'hard',
         tip:'Index bars ALL strings at fret 1. Middle on G fret 2, ring on A fret 3, pinky on D fret 3. Use arm weight not just finger pressure. Takes weeks of practice.',
         songs:['Hey Jude','Let It Be','Redemption Song']},
  'B7': {n:'B7', t:'Dominant 7th', no:'B D# F# A',  s:['x',2,1,2,0,2], f:[0,2,1,3,0,4], m:[1,0,0,0,0,0], d:'med',
         tip:'Index on D fret 1, middle on A fret 2, ring on G fret 2, pinky on high E fret 2. Open B string. Common in blues and jazz.',
         songs:['Folsom Prison Blues','Norwegian Wood','Sultans of Swing']},
  'E7': {n:'E7', t:'Dominant 7th', no:'E G# B D',   s:[0,2,0,1,0,0],   f:[0,2,0,1,0,0], m:[0,0,0,0,0,0], d:'easy',
         tip:'Like E major but lift ring finger off D string. Index on G fret 1, middle on A fret 2. Bluesy unresolved feel.',
         songs:['Red House','Pride and Joy','Crossroads']},
  'A7': {n:'A7', t:'Dominant 7th', no:'A C# E G',   s:['x',0,2,0,2,0], f:[0,0,1,0,3,0], m:[1,0,0,0,0,0], d:'easy',
         tip:'Index on D fret 2, ring on B fret 2. G and high E open. Very open funky chord. Essential for 12-bar blues.',
         songs:['Midnight Special','Tulsa Time','Guitar Boogie']},
  'C7': {n:'C7', t:'Dominant 7th', no:'C E G Bb',   s:['x',3,2,3,1,0], f:[0,3,2,4,1,0], m:[1,0,0,0,0,0], d:'med',
         tip:'Ring on A fret 3, middle on D fret 2, pinky on G fret 3, index on B fret 1. Movable shape for 12-bar blues.',
         songs:['Born Under a Bad Sign','I Got You','Thrill Is Gone']},
  'G7': {n:'G7', t:'Dominant 7th', no:'G B D F',    s:[3,2,0,0,0,1],   f:[3,2,0,0,0,1], m:[0,0,0,0,0,0], d:'easy',
         tip:'Like G but index on high E fret 1 instead of pinky on fret 3. Great blues turnaround chord.',
         songs:['Glory Days','Cocaine','I Shot the Sheriff']},
  'D7': {n:'D7', t:'Dominant 7th', no:'D F# A C',   s:['x','x',0,2,1,2],f:[0,0,0,2,1,3], m:[1,1,0,0,0,0], d:'easy',
         tip:'Index on B fret 1, middle on G fret 2, ring on high E fret 2. D string open. Bright bluesy character.',
         songs:['Margaritaville','Ring of Fire','This Land Is Your Land']},
  'Am7':{n:'Am7',t:'Minor 7th',    no:'A C E G',    s:['x',0,2,0,1,0], f:[0,0,2,0,1,0], m:[1,0,0,0,0,0], d:'easy',
         tip:'Like Am but lift ring finger off G so it rings open. Index on B fret 1, middle on D fret 2. Jazzy mellow dreamy tone.',
         songs:['Oye Como Va','Fly Me to the Moon','Autumn Leaves']}
};
const SN=['E','A','D','G','B','e'];
const SC=['#e85c3a','#e8a832','#3dba7a','#4a8fe8','#9b6dd7','#d4537e'];
const PAGES=['dashboard','guitar','practice','progress','production','ear','theory'];
const PTABS={dashboard:'Dashboard',guitar:'Guitar',practice:'Practice',progress:'Progress',production:'Production',ear:'Ear training',theory:'Theory'};

let curPage='dashboard',selChord='C',metroBpm=80,metroOn=false,metroIv=null,metroBeat=0,audioCtx=null,pracSec=0,pracTm=null,charts={};

// ─── Storage ───
function gS(){return JSON.parse(localStorage.getItem('tempo_sess')||'[]')}
function sS(v){localStorage.setItem('tempo_sess',JSON.stringify(v))}
function gP(){return JSON.parse(localStorage.getItem('tempo_cprog')||'{}')}
function sP(v){localStorage.setItem('tempo_cprog',JSON.stringify(v))}
function streak(ss){let c=0;const d=new Date();for(let i=0;i<365;i++){const x=new Date(d);x.setDate(x.getDate()-i);if(ss.some(s=>new Date(s.date).toDateString()===x.toDateString()))c++;else break}return c}
function wkMin(ss){const n=Date.now();return ss.filter(s=>(n-new Date(s.date).getTime())<7*864e5).reduce((a,s)=>a+s.mins,0)}

// ─── SVG Chord ───
function drawC(key,sz=180){
  const c=CH[key];if(!c)return'';
  const w=sz,h=sz*1.15,px=24,py=32,fw=(w-2*px)/5,fh=(h-py-20)/5;
  let o=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">`;
  o+=`<rect x="${px-1}" y="${py-2}" width="${(w-2*px)+2}" height="4" rx="1" fill="#888"/>`;
  for(let i=1;i<=5;i++)o+=`<line x1="${px}" y1="${py+i*fh}" x2="${w-px}" y2="${py+i*fh}" stroke="#444" stroke-width="0.5"/>`;
  for(let i=0;i<6;i++)o+=`<line x1="${px+i*fw}" y1="${py}" x2="${px+i*fw}" y2="${py+5*fh}" stroke="#666" stroke-width="${1.6-i*.18}"/>`;
  for(let i=0;i<6;i++){const x=px+i*fw;if(c.m[i])o+=`<text x="${x}" y="${py-10}" text-anchor="middle" font-size="12" font-weight="500" fill="#777" font-family="Plus Jakarta Sans,sans-serif">✕</text>`;else if(c.s[i]===0)o+=`<circle cx="${x}" cy="${py-12}" r="5" fill="none" stroke="#aaa" stroke-width="1.5"/>`}
  for(let i=0;i<6;i++){const fr=c.s[i];if(fr!==0&&fr!=='x'){const x=px+i*fw,y=py+(fr-.5)*fh,r=Math.min(fw,fh)*.3;o+=`<circle cx="${x}" cy="${y}" r="${r}" fill="${SC[i]}"/>`;if(c.f[i])o+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#fff" font-family="DM Mono,monospace">${c.f[i]}</text>`}}
  for(let i=0;i<6;i++)o+=`<text x="${px+i*fw}" y="${h-2}" text-anchor="middle" font-size="9" fill="#666" font-family="DM Mono,monospace">${SN[i]}</text>`;
  return o+'</svg>';
}

// ─── Navigation ───
function go(id){curPage=id;document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));document.getElementById('pg-'+id).classList.add('on');renderTabs();
  ({dashboard:rDash,guitar:rGuitar,practice:rPractice,progress:rProgress,production:rProd,ear:rEar,theory:rTheory})[id]()}
function renderTabs(){document.getElementById('tabBar').innerHTML=PAGES.map(p=>`<div class="tab${curPage===p?' on':''}" onclick="go('${p}')">${PTABS[p]}</div>`).join('')}
function rGreet(){const h=new Date().getHours();const g=h<12?'Good morning':h<18?'Good afternoon':'Good evening';const ds=new Date().toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'});document.getElementById('greetBox').innerHTML=`<div class="greet-line">${g}, <b>Uglum</b></div><div class="greet-date">${ds}</div>`}

// ═══════════════ DASHBOARD ═══════════════
function rDash(){
  rGreet();
  const ss=gS(),pr=gP(),tm=ss.reduce((a,s)=>a+s.mins,0),sk=streak(ss),ln=Object.values(pr).filter(v=>v>=50).length,wm=wkMin(ss);
  const el=document.getElementById('pg-dashboard');
  el.innerHTML=`
    <div class="metrics">
      <div class="met"><div class="ml">Total practice</div><div class="mv">${tm}<span style="font-size:13px;color:var(--tx3)">m</span></div><div class="ms">${(tm/60).toFixed(1)} hours</div></div>
      <div class="met"><div class="ml">Streak</div><div class="mv" style="color:var(--green)">${sk}<span style="font-size:13px;color:var(--tx3)">d</span></div><div class="ms">${sk>0?'Keep going!':'Start today!'}</div></div>
      <div class="met"><div class="ml">Chords learned</div><div class="mv" style="color:var(--blue)">${ln}<span style="font-size:13px;color:var(--tx3)">/${Object.keys(CH).length}</span></div><div class="ms">${Math.round(ln/Object.keys(CH).length*100)}% complete</div></div>
      <div class="met"><div class="ml">This week</div><div class="mv" style="color:var(--amber)">${wm}<span style="font-size:13px;color:var(--tx3)">m</span></div><div class="ms">${wm>=60?'On track!':'Aim for 60m/wk'}</div></div>
    </div>
    <div class="two" style="margin-bottom:14px">
      <div class="card"><div class="card-t"><span class="dot"></span>Weekly practice</div><div class="chart-box"><canvas id="chW"></canvas></div><div class="legend"><span><i style="background:var(--accent)"></i>Minutes</span></div></div>
      <div class="card"><div class="card-t"><span class="dot" style="background:var(--blue)"></span>Skill radar</div><div class="chart-box"><canvas id="chR"></canvas></div></div>
    </div>
    <div class="sec">Chord mastery</div>
    <div class="mg">${Object.keys(CH).map(k=>{const p=pr[k]||0;const c=p>=80?'var(--green)':p>=40?'var(--amber)':p>=10?'var(--blue)':'var(--bd2)';return`<div class="mc" onclick="go('guitar');selChord='${k}';rGuitar()"><div class="mb" style="border-color:${c}"><div class="mfill" style="height:${p}%;background:${c}"></div>${k}</div><div class="mpct">${p}%</div></div>`}).join('')}</div>
    <div class="sec">Quick actions</div>
    <div class="sg">
      <div class="sug" style="background:rgba(232,92,58,.08)" onclick="go('practice')"><div class="st" style="color:var(--accent)">Start practice</div><div class="sd" style="color:var(--accent)">Timer + metronome</div></div>
      <div class="sug" style="background:rgba(74,143,232,.08)" onclick="go('guitar')"><div class="st" style="color:var(--blue)">Chord library</div><div class="sd" style="color:var(--blue)">16 chords with diagrams</div></div>
      <div class="sug" style="background:rgba(61,186,122,.08)" onclick="go('progress')"><div class="st" style="color:var(--green)">View progress</div><div class="sd" style="color:var(--green)">Charts and history</div></div>
    </div>`;
  bWeek(ss);bRadar();
}
function bWeek(ss){const c=document.getElementById('chW');if(!c)return;if(charts.w)charts.w.destroy();const d=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];const v=d.map((_,i)=>{const x=new Date();x.setDate(x.getDate()-(6-i));return ss.filter(s=>new Date(s.date).toDateString()===x.toDateString()).reduce((a,s)=>a+s.mins,0)});charts.w=new Chart(c,{type:'bar',data:{labels:d,datasets:[{data:v,backgroundColor:v.map(x=>x>0?'#e85c3a':'#2a2a2e'),borderRadius:5,barThickness:28}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#222',titleColor:'#f0ede6',bodyColor:'#f0ede6',borderColor:'#3a3a3e',borderWidth:1,cornerRadius:8}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6a6862',font:{size:11,family:'DM Mono'}}},x:{grid:{display:false},ticks:{color:'#6a6862',font:{size:11,family:'DM Mono'}}}}}})}
function bRadar(){const c=document.getElementById('chR');if(!c)return;if(charts.r)charts.r.destroy();const p=gP();const oa=Math.round(['C','Am','G','Em','D','A','E'].reduce((a,k)=>a+(p[k]||0),0)/7);const ba=p['F']||0;const sa=Math.round(['B7','E7','A7','C7','G7','D7','Am7'].reduce((a,k)=>a+(p[k]||0),0)/7);charts.r=new Chart(c,{type:'radar',data:{labels:['Open chords','Barre','7th chords','Strumming','Rhythm','Ear'],datasets:[{data:[oa,ba,sa,Math.min(100,oa*.8),Math.min(100,oa*.6),Math.min(100,oa*.4)],backgroundColor:'rgba(232,92,58,.1)',borderColor:'#e85c3a',pointBackgroundColor:'#e85c3a',pointRadius:3,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{beginAtZero:true,max:100,ticks:{display:false,stepSize:25},grid:{color:'rgba(255,255,255,.06)'},pointLabels:{color:'#9c9a92',font:{size:10,family:'Plus Jakarta Sans'}}}}}})}

// ═══════════════ GUITAR (full Fretboard section) ═══════════════
function rGuitar(){
  rGreet();const el=document.getElementById('pg-guitar');
  const cats={Major:[],Minor:[],'7th':[]};
  Object.entries(CH).forEach(([k,v])=>{if(v.t.includes('7'))cats['7th'].push(k);else if(v.t.includes('Minor'))cats.Minor.push(k);else cats.Major.push(k)});
  el.innerHTML=Object.entries(cats).map(([cat,keys])=>`
    <div class="sec">${cat} chords</div>
    <div class="cg">${keys.map(k=>`<div class="cc${selChord===k?' sel':''}" onclick="selChord='${k}';rGuitar()"><div style="display:flex;justify-content:space-between;align-items:start"><div><div class="cn">${CH[k].n}</div><div class="ct">${CH[k].t}</div></div><span class="diff diff-${CH[k].d}">${CH[k].d}</span></div><div style="margin-top:8px">${drawC(k,110)}</div></div>`).join('')}</div>
  `).join('')+`<div class="detail" id="cDet"></div>`;
  rDet();
}
function rDet(){
  const el=document.getElementById('cDet');if(!el)return;
  const c=CH[selChord],pr=gP(),pct=pr[selChord]||0,col=pct>=80?'var(--green)':pct>=40?'var(--amber)':'var(--blue)';
  el.innerHTML=`
    <div class="fb-panel">
      <div style="font-family:var(--serif);font-size:28px">${c.n}</div>
      <div style="font-size:12px;color:var(--tx3);margin-bottom:14px">${c.t}</div>
      ${drawC(selChord,240)}
      <div class="sdots" style="margin-top:12px">${SN.map((s,i)=>{const v=c.s[i],bg=v==='x'?'#333':SC[i],op=v==='x'?'.4':'.85';return`<div class="sdot" style="background:${bg};opacity:${op}">${v==='x'?'✕':v}</div>`}).join('')}</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:6px;font-family:var(--mono)">fret per string</div>
    </div>
    <div class="info-p">
      <div class="irow"><span class="k">Notes</span><span class="v" style="font-family:var(--mono)">${c.no}</span></div>
      <div class="irow"><span class="k">Difficulty</span><span class="v"><span class="diff diff-${c.d}">${c.d}</span></span></div>
      <div class="irow"><span class="k">Mastery</span><span class="v" style="color:${col}">${pct}%</span></div>
      <div style="margin-top:8px"><div class="pb" style="height:6px"><div class="pf" style="width:${pct}%;background:${col}"></div></div></div>
      <div class="tip">${c.tip}</div>
      <div style="margin-top:12px;font-size:12px;color:var(--tx3);font-weight:600">Songs using this chord</div>
      <div class="songs">${c.songs.map(s=>`<span class="stag">${s}</span>`).join('')}</div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn" style="flex:1" onclick="uProg('${selChord}',10)">Practice +10%</button>
        <button class="btn" style="flex:0 0 90px;color:var(--accent)" onclick="uProg('${selChord}',-10)">−10%</button>
      </div>
    </div>`;
}
function uProg(k,d){const p=gP();p[k]=Math.max(0,Math.min(100,(p[k]||0)+d));sP(p);rGuitar()}

// ═══════════════ PRACTICE ═══════════════
function rPractice(){
  rGreet();const el=document.getElementById('pg-practice');
  el.innerHTML=`
    <div class="card"><div class="card-t"><span class="dot"></span>Metronome</div>
      <div class="bpm-row"><button class="bpm-btn" onclick="adjB(-5)">−</button><div class="bpm-d"><div class="bpm-n" id="bN">${metroBpm}</div><div class="bpm-l">BPM</div></div><button class="bpm-btn" onclick="adjB(5)">+</button><input type="range" class="bpm-s" min="40" max="200" value="${metroBpm}" step="5" oninput="setB(+this.value)"></div>
      <div class="bdots" id="bDots">${[0,1,2,3].map(i=>`<div class="bd${metroBeat===i&&metroOn?' on':''}"></div>`).join('')}</div>
      <button class="btn${metroOn?' run':''}" onclick="togM()">${metroOn?'Stop':'Start metronome'}</button>
    </div>
    <div class="card"><div class="card-t"><span class="dot" style="background:var(--green)"></span>Practice timer</div>
      <div style="text-align:center;margin:20px 0"><div style="font-family:var(--mono);font-size:42px;font-weight:500;letter-spacing:2px" id="tD">${fT(pracSec)}</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Logged when you stop</div></div>
      <button class="btn${pracTm?' run':''}" onclick="togT()">${pracTm?'Stop & log session':'Start practice session'}</button>
    </div>
    <div class="card"><div class="card-t"><span class="dot" style="background:var(--amber)"></span>Chord transition drills</div>
      <p style="font-size:12px;color:var(--tx3);margin-bottom:10px">Set metronome to 60 BPM. Switch chords every 4 beats. Increase as transitions smooth out.</p>
      <div class="drill-g">${[['C → G → Am → F','Pop / Ballad'],['G → C → D','Rock / Country'],['Am → F → C → G','Pop anthem'],['Em → G → D → A','Rock / Indie'],['E → A → B7','Blues (key of E)'],['A → D → E','Rock (key of A)']].map(([p,s])=>`<div class="drill"><div class="dn">${p}</div><div class="ds">${s}</div></div>`).join('')}</div>
    </div>
    <div class="card"><div class="card-t"><span class="dot" style="background:var(--purple)"></span>Finger exercises</div>
      ${[['Chromatic crawl','One finger per fret (1-2-3-4) on each string from low E down. Go slow and clean.','2 min'],
         ['Spider walk','Alternating finger patterns across strings. Builds cross-string coordination.','2 min'],
         ['Stretch drills','Index on fret 1, pinky on fret 5. Hold 10 sec/string. Builds reach for barre chords.','1 min'],
         ['Hammer-on / Pull-off','Open → hammer fret 2 → pull off. Each string. Builds fretting hand power.','2 min'],
         ['String skipping','Pick strings 6-4-5-3-4-2 pattern. Builds picking accuracy.','2 min']
      ].map(([n,d,t])=>`<div class="exercise"><div style="display:flex;justify-content:space-between"><div class="en">${n}</div><span style="font-size:10px;color:var(--tx3);font-family:var(--mono)">${t}</span></div><div class="ed">${d}</div></div>`).join('')}
    </div>`;
}
function adjB(d){metroBpm=Math.max(40,Math.min(200,metroBpm+d));const e=document.getElementById('bN');if(e)e.textContent=metroBpm;if(metroOn){clearInterval(metroIv);startM()}}
function setB(v){metroBpm=v;const e=document.getElementById('bN');if(e)e.textContent=v;if(metroOn){clearInterval(metroIv);startM()}}
function togM(){if(metroOn){clearInterval(metroIv);metroOn=false;metroBeat=0}else{metroOn=true;metroBeat=0;startM()}rPractice()}
function startM(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();metroIv=setInterval(()=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=metroBeat===0?880:660;g.gain.setValueAtTime(.25,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+.08);document.querySelectorAll('.bd').forEach((d,i)=>{d.classList.remove('on','down');if(i===metroBeat)d.classList.add(metroBeat===0?'down':'on')});metroBeat=(metroBeat+1)%4},60000/metroBpm)}
function togT(){if(pracTm){clearInterval(pracTm);pracTm=null;const m=Math.max(1,Math.round(pracSec/60));const ss=gS();ss.push({date:new Date().toISOString(),mins:m});sS(ss);pracSec=0}else{pracTm=setInterval(()=>{pracSec++;const d=document.getElementById('tD');if(d)d.textContent=fT(pracSec)},1000)}rPractice()}
function fT(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}

// ═══════════════ PROGRESS ═══════════════
function rProgress(){
  rGreet();const el=document.getElementById('pg-progress'),ss=gS(),pr=gP();
  el.innerHTML=`
    <div class="card"><div class="card-t"><span class="dot"></span>Last 28 days</div>
      <div class="hm">${Array.from({length:28}).map((_,i)=>{const d=new Date();d.setDate(d.getDate()-(27-i));const m=ss.filter(s=>new Date(s.date).toDateString()===d.toDateString()).reduce((a,s)=>a+s.mins,0);const op=m===0?.06:Math.min(1,.15+m/45);return`<div class="hc" data-t="${d.toLocaleDateString('en',{month:'short',day:'numeric'})}:${m}m" style="background:var(--accent);opacity:${op}"></div>`}).join('')}</div>
      <div class="legend"><span><i style="background:var(--accent);opacity:.06"></i>None</span><span><i style="background:var(--accent);opacity:.3"></i>Light</span><span><i style="background:var(--accent);opacity:.6"></i>Medium</span><span><i style="background:var(--accent);opacity:1"></i>Heavy</span></div>
    </div>
    <div class="two-eq" style="margin-bottom:14px">
      <div class="card"><div class="card-t"><span class="dot" style="background:var(--green)"></span>Cumulative</div><div class="chart-box"><canvas id="chCu"></canvas></div></div>
      <div class="card"><div class="card-t"><span class="dot" style="background:var(--blue)"></span>Chord types</div><div class="chart-box"><canvas id="chDo"></canvas></div><div class="legend"><span><i style="background:#e85c3a"></i>Major</span><span><i style="background:#4a8fe8"></i>Minor</span><span><i style="background:#e8a832"></i>7th</span></div></div>
    </div>
    <div class="card"><div class="card-t"><span class="dot" style="background:var(--amber)"></span>Chord mastery</div>
      ${Object.entries(CH).map(([k,v])=>{const p=pr[k]||0,c=p>=80?'#3dba7a':p>=40?'#e8a832':p>=10?'#4a8fe8':'#3a3a3e';return`<div class="pi"><div class="pbadge" style="background:${c}">${k}</div><div class="pbw"><div class="pbl"><span>${v.n} ${v.t}</span><span style="font-family:var(--mono)">${p}%</span></div><div class="pb"><div class="pf" style="width:${p}%;background:${c}"></div></div></div></div>`}).join('')}
    </div>
    <div class="card"><div class="card-t"><span class="dot" style="background:var(--purple)"></span>Session log</div>
      <div class="slog">${ss.length===0?'<div style="padding:24px;text-align:center;color:var(--tx3)">No sessions yet. Start practicing!</div>':ss.slice().reverse().slice(0,30).map(s=>`<div class="sr"><span class="sd">${new Date(s.date).toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'})}</span><span class="sm">${s.mins}m</span><span style="color:var(--tx3)">Practice session</span></div>`).join('')}</div>
      ${ss.length>0?`<div style="margin-top:10px;text-align:right"><button class="btn" style="width:auto;display:inline-block;padding:7px 14px;font-size:11px;color:var(--accent)" onclick="if(confirm('Clear all sessions?')){sS([]);rProgress()}">Clear history</button></div>`:''}
    </div>`;
  bCumul(ss);bDonut();
}
function bCumul(ss){const c=document.getElementById('chCu');if(!c)return;if(charts.cu)charts.cu.destroy();const d=Array.from({length:14}).map((_,i)=>{const x=new Date();x.setDate(x.getDate()-(13-i));return{l:x.toLocaleDateString('en',{month:'short',day:'numeric'}),v:ss.filter(s=>new Date(s.date)<=x).reduce((a,s)=>a+s.mins,0)}});charts.cu=new Chart(c,{type:'line',data:{labels:d.map(x=>x.l),datasets:[{data:d.map(x=>x.v),borderColor:'#e85c3a',backgroundColor:'rgba(232,92,58,.06)',fill:true,tension:.35,pointRadius:2,pointBackgroundColor:'#e85c3a',borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6a6862',font:{size:10,family:'DM Mono'}}},x:{grid:{display:false},ticks:{color:'#6a6862',font:{size:9,family:'DM Mono'},maxRotation:45}}}}})}
function bDonut(){const c=document.getElementById('chDo');if(!c)return;if(charts.dn)charts.dn.destroy();const p=gP();const mj=Math.round(['C','G','D','A','E'].reduce((a,k)=>a+(p[k]||0),0)/5);const mi=Math.round(['Am','Em','Dm'].reduce((a,k)=>a+(p[k]||0),0)/3);const sv=Math.round(['B7','E7','A7','C7','G7','D7','Am7'].reduce((a,k)=>a+(p[k]||0),0)/7);charts.dn=new Chart(c,{type:'doughnut',data:{labels:['Major','Minor','7th'],datasets:[{data:[Math.max(1,mj),Math.max(1,mi),Math.max(1,sv)],backgroundColor:['#e85c3a','#4a8fe8','#e8a832'],borderColor:'#131315',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false}}}})}

// ═══════════════ PLACEHOLDER SECTIONS ═══════════════
function rProd(){rGreet();document.getElementById('pg-production').innerHTML=`<div class="card"><div class="placeholder"><div class="ph-icon">⌬</div><div class="ph-title">Production</div><div class="ph-sub">Logic Pro, GarageBand, mixing, effects, automation — coming soon. This section will track your DAW skills, project completions, and production techniques.</div></div></div>`}
function rEar(){rGreet();document.getElementById('pg-ear').innerHTML=`<div class="card"><div class="placeholder"><div class="ph-icon">◎</div><div class="ph-title">Ear training</div><div class="ph-sub">Interval recognition, chord identification, relative pitch exercises — coming soon. Interactive drills to sharpen your musical ear.</div></div></div>`}
function rTheory(){rGreet();document.getElementById('pg-theory').innerHTML=`<div class="card"><div class="placeholder"><div class="ph-icon">♮</div><div class="ph-title">Music theory</div><div class="ph-sub">Scales, modes, keys, chord construction, the circle of fifths — coming soon. Visual lessons to build your theoretical foundation.</div></div></div>`}

// ─── Init ───
renderTabs();go('dashboard');
</script>
</body>
</html>
